<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itsRealM12C</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Completely disables native mobile tap highlight color tinting */
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html {
            height: 100%;
            font-family: 'Comfortaa', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* WebGL Engine Canvas Pinning */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Half-invisible dark overlay layer to dim the busy shader lines */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        /* Page Content wrapper sitting above background layers */
        .content-body {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 0;
        }

        /* Clean stacked outlined text element structural column */
        header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 25px; 
            margin-top: 20px;
        }

        .username {
            font-size: 4.2rem;
            font-weight: 400;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.95);
            letter-spacing: 2px;
        }

        .user-bio {
            font-size: 3rem;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1.3px rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 2.6rem;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1.2px rgba(255, 255, 255, 0.85);
            letter-spacing: 1px;
        }

        /* Carousel Row Structure */
        .carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 30px;
            position: relative;
            margin-bottom: 30px;
        }

        /* Bright, high-visibility layout arrows */
        .nav-arrow {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            padding: 0 25px;
            z-index: 10;
            line-height: 1;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
        }
        
        .nav-arrow:hover {
            color: #00ffcc;
            text-shadow: 0 0 25px rgba(0, 255, 204, 0.9);
            transform: scale(1.2);
        }

        /* Continuous Structural Line Framework */
        .cards-wrapper {
            display: flex;
            position: relative;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1200px;
        }

        /* Renders the continuous horizontal line seamlessly behind the cards */
        .cards-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50px;
            right: -50px;
            height: 2px;
            border-top: 2px dashed rgba(255, 255, 255, 0.85);
            z-index: 1;
            pointer-events: none;
        }

        /* The Card Unit - Drops cleanly beneath the continuous wireframe line */
        .card {
            width: 180px;
            height: 240px;
            background: rgba(0, 0, 0, 0.85);
            margin: 0 15px;
            
            /* Structural perimeter framework matching your mockup exactly */
            border: 2px solid rgba(255, 255, 255, 0.85);
            border-top: none;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            
            position: relative;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            font-weight: 300;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Structural upper corner anchors that lock perfectly into the horizontal dash system */
        .card::before, .card::after {
            content: '';
            position: absolute;
            top: 0;
            width: 12px;
            height: 2px;
            background: rgba(255, 255, 255, 0.85);
            transition: background 0.4s ease;
        }
        .card::before { left: -2px; }
        .card::after { right: -2px; }

        /* Glowing Neon Color Transformations on Mouse Hover */
        .card:hover {
            background: rgba(0, 255, 204, 0.08);
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.25);
            transform: translateY(12px);
        }

        .card:hover::before, .card:hover::after {
            background: #00ffcc;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="content-body">
        <header>
            <h1 class="username">itsRealM12C</h1>
            <h2 class="user-bio">App maker, and ports apps.</h2>
        </header>
        
        <h2 class="title">Tools i've made</h2>
        
        <div class="carousel-container">
            <div class="nav-arrow" onclick="scrollLeft()">&#x2039;</div>

            <div class="cards-wrapper">
                <div class="card" onclick="openTool(1)">MBN</div>
                <div class="card" onclick="openTool(2)">PVR</div>
                <div class="card" onclick="openTool(3)">WAD</div>
                <div class="card" onclick="openTool(4)">BIN</div>
                <div class="card" onclick="openTool(5)">ROQ</div>
            </div>

            <div class="nav-arrow" onclick="scrollRight()">&#x203A;</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // Decoupled Shader Strings Matrices
        const vsCode = `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `;

        const snoiseCode = `
          vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
          vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
          vec4 permute(vec4 x) { return mod289(((x*34.0)+10.0)*x); }
          vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

          float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 0.142857142857;
            vec3 ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ * ns.x + ns.yyyy;
            vec4 y = y_ * ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.5 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
            m = m * m;
            return 105.0 * dot(m*m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
          }
        `;

        const fsCode = `
          uniform float time;
          uniform vec2 resolution;
          varying vec2 vUv;

          void main() {
            vec2 st = vUv - vec2(0.5);
            st.x *= (resolution.x / resolution.y);

            float noiseValue = snoise(vec3(st * 3.2, time * 0.08));

            float bands = 15.0; 
            float lowerBound = floor(noiseValue * bands) / bands;
            float deltaDiff = noiseValue - lowerBound;

            float lineThickness = 0.015; 
            if (deltaDiff > lineThickness) {
                discard; 
            }

            // Uniform gray topographic background asset parameters
            vec3 lineRGB = vec3(0.35, 0.35, 0.35); 
            float edgeAlpha = smoothstep(lineThickness, 0.0, deltaDiff); 

            gl_FragColor = vec4(lineRGB, edgeAlpha);
          }
        `;

        // Canvas Setup Engine
        let width = window.innerWidth;
        let height = window.innerHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(0, width, 0, height, 1, 3);
        camera.position.z = 2;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        let geometry = new THREE.PlaneGeometry(width, height);
        geometry.translate(width / 2, height / 2, 0); 

        const uniforms = {
          time: { value: 0.0 },
          resolution: { value: new THREE.Vector2(width, height) }
        };

        const material = new THREE.ShaderMaterial({
          uniforms: uniforms,
          vertexShader: vsCode,
          fragmentShader: snoiseCode + fsCode,
          transparent: true,
          side: THREE.DoubleSide
        });

        let mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const clock = new THREE.Clock();
        function animate() {
          requestAnimationFrame(animate);
          uniforms.time.value = clock.getElapsedTime();
          renderer.render(scene, camera);
        }
        animate();

        // Canvas window resizing logic integration
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            
            renderer.setSize(width, height);
            uniforms.resolution.value.set(width, height);
            
            camera.right = width;
            camera.bottom = height;
            camera.updateProjectionMatrix();
            
            scene.remove(mesh);
            geometry.dispose();
            geometry = new THREE.PlaneGeometry(width, height);
            geometry.translate(width / 2, height / 2, 0);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        });
    </script>

    <script>
        function openTool(id) {
            // Card 5 triggers an alert modal window
            if (id === 5) {
                alert("Coming soon!");
                return;
            }

            // Mapped to your live GitHub Pages URLs
            const urls = {
                1: "https://itsrealm12c.github.io/mbn/",
                2: "https://itsrealm12c.github.io/pvr/",
                3: "https://itsrealm12c.github.io/dwade/",
                4: "https://itsrealm12c.github.io/resbin/"
            };

            if(urls[id] && urls[id] !== "#") {
                window.open(urls[id], '_blank');
            }
        }

        function scrollLeft() { console.log("Navigate Left Module Group"); }
        function scrollRight() { console.log("Navigate Right Module Group"); }
    </script>
</body>
</html>
